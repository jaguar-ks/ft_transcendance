# Basic ModSecurity configuration file

# Enable ModSecurity engine
SecRuleEngine On

# Default action on a violation
SecDefaultAction "deny,log"

# Enable request body processing (for POST requests)
SecRequestBodyAccess On

# Enable response body processing (optional)
SecResponseBodyAccess Off

# Configure request body size limit
SecRequestBodyLimit 13107200  # 10MB

# Configure buffer size for request bodies
SecRequestBodyInMemoryLimit 512000  # 500KB

# Set a logging file for ModSecurity (optional)
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 9  # Debugging level; increase for more verbose logs

# Enable logging for denied requests
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsecurity/audit.log

# Set the log format
SecAuditLogFormat JSON

# Basic protection against SQL injection and other common attacks
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS|XML:/* "(?i)(union.*select|select.*from|drop.*table|insert.*into|update.*set)" \
    "phase:2,deny,status:403,id:1000001,log,msg:'SQL Injection attack detected'"

SecRule REQUEST_URI|ARGS|REQUEST_HEADERS|XML:/* "(?i)(<.*script.*>)" \
    "phase:2,deny,status:403,id:1000002,log,msg:'XSS attack detected'"

# Block any traffic with suspicious user-agent patterns
SecRule REQUEST_HEADERS:User-Agent "libwww-perl|curl|wget|python-requests" \
    "phase:1,deny,status:403,id:1000003,log,msg:'Suspicious User-Agent detected'"

# Block access to known malicious IP addresses (example)
SecRule REMOTE_ADDR "@ipMatch 192.168.1.1" \
    "phase:1,deny,status:403,id:1000004,log,msg:'Blocked IP address'"

# Enable file upload restrictions (optional)
SecRule REQUEST_HEADERS:Content-Type "multipart/form-data" \
    "phase:2,deny,status:403,id:1000005,log,msg:'File upload request blocked'"

# Include additional ModSecurity rule sets (for OWASP Core Rule Set)
SecRuleInclude /etc/modsecurity/owasp-modsecurity-crs/base_rules/*.conf

# Customize behavior based on request size
SecRequestBodyNoFilesLimit 131072  # 128KB for requests without files
SecResponseBodyLimit 524288  # 500KB for responses

# Block access to certain file types (like .env, .git directories, etc.)
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS|XML:/* "\.(env|git|gitmodules|htpasswd|htaccess)$" \
    "phase:2,deny,status:403,id:1000006,log,msg:'Attempt to access sensitive file type'"

# ModSecurity Response Headers
SecResponseBodyLimitAction ProcessPartial

# Do not check responses for certain status codes
SecRule RESPONSE_STATUS "!@streq 200" \
    "phase:4,pass,id:1000007,log,msg:'Response code not 200, skipping body inspection'"

# Performance tuning settings (adjust as needed)
SecRequestBodyLimitAction Reject
SecResponseBodyLimitAction Reject
